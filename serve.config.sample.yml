# Megatest Serve — Configuration
#
# Copy this file:  cp serve.config.sample.yml serve.config.yml
# Then edit the projects list below to point at your repos.
# Each project path should contain a .megatest/ directory.

title: "Megatest Reports"

server:
  port: 3000
  host: "0.0.0.0"

# Projects to serve reports from
# Each entry needs a path to the repo containing .megatest/
projects:
  - name: my-app
    path: /data/my-app
  # - name: another-project
  #   path: /data/another-project
