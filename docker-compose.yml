services:
  megatest:
    build: .
    restart: unless-stopped
    volumes:
      - ./serve.config.yml:/app/serve.config.yml:ro
      - /home/ubuntu/git/megatest/.megatest:/data/megatest/.megatest
      - /home/ubuntu/git/fj2/.megatest:/data/fj2/.megatest
    networks:
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.megatest.rule=Host(`megatest.opendle.com`)"
      - "traefik.http.routers.megatest.entrypoints=websecure"
      - "traefik.http.routers.megatest.tls=true"
      - "traefik.http.routers.megatest.tls.certresolver=letsencrypt"
      - "traefik.http.routers.megatest.middlewares=badger@file"
      - "traefik.http.services.megatest.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-proxy"

networks:
  traefik-proxy:
    external: true
