services:
  mocks:
    build: .
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.megatest-mocks.rule=Host(`dev-megatest.opendle.com`)"
      - "traefik.http.routers.megatest-mocks.entrypoints=websecure"
      - "traefik.http.routers.megatest-mocks.tls.certresolver=letsencrypt"
      - "traefik.http.services.megatest-mocks.loadbalancer.server.port=80"
    networks:
      - traefik-proxy

networks:
  traefik-proxy:
    external: true
